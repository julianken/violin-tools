name: ci

# The repo's first real app-CI gate: typecheck / lint / test / build on every PR
# and on push to main. Runs alongside scaffolding.yml (the file/shim presence
# guard) — it does not replace it. These are the four checks that the PR template
# Test-plan and AGENTS.md "Working in the tree" now reference as real commands.

on:
  pull_request:
  push:
    branches: [main]

# A later push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
