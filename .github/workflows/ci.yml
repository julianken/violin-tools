name: ci

# The repo's first real app-CI gate: typecheck / lint / test / build on every PR
# and on push to main. Runs alongside scaffolding.yml (the file/shim presence
# guard) — it does not replace it. These are the four checks that the PR template
# Test-plan and AGENTS.md "Working in the tree" now reference as real commands.

on:
  pull_request:
  push:
    branches: [main]

# A later push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # SOFT-LAUNCH (S8): the Playwright e2e suite — `pnpm test:e2e` runs ALL specs in
  # `apps/web/e2e/` (motion `motion.spec.ts`, the §10 mobile-reflow `responsive.
  # spec.ts` added in S11, and the a11y spec, which the dedicated `a11y` job below
  # also runs on its own). A SEPARATE job from `gates`
  # — it is deliberately NOT in the branch ruleset's required checks nor in
  # .mergify.yml `check-success`, so a flake never blocks a merge while the suite
  # proves itself. It is the first noisy/non-deterministic check, so it follows the
  # GAPS.md "soft-launch → dated-flip → promote-to-blocker" rollout ritual: ships
  # SOFT now, to be promoted to required at S12 once stable. `gates` above and its
  # required status are unchanged.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @violin-tools/web exec playwright install --with-deps chromium

      - name: Run e2e (Playwright)
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  # SOFT-LAUNCH (S10): the axe / Playwright accessibility suite (e2e/a11y.spec.ts).
  # A SEPARATE job from `gates` — deliberately NOT in the branch ruleset's required
  # checks nor in .mergify.yml `check-success`, following the same GAPS.md
  # soft-launch ritual as the `e2e` job above: it ships SOFT now (a real browser
  # axe scan can flake or surface a new advisory rule), to be promoted to a
  # required check at the S13 capstone once stable. It runs the SAME Playwright
  # config as `e2e` but FILTERS to the a11y spec, so the two suites report
  # independently. `gates` and its required status are unchanged.
  a11y:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @violin-tools/web exec playwright install --with-deps chromium

      - name: Run a11y (axe + Playwright)
        run: pnpm --filter @violin-tools/web exec playwright test a11y.spec.ts

      - name: Upload a11y Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: a11y-playwright-report
          path: apps/web/playwright-report
          retention-days: 7
