<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Violin Tools</title>
    <meta
      name="description"
      content="Violin Tools — focused practice tools for violinists. Scales is a whole-neck fingerboard note map."
    />
    <!-- Preload the critical, self-hosted UI faces (Inter 400/500) so first
         paint is stable and the S12 reduced-motion visual snapshots stay
         deterministic (DESIGN.md §3; fonts are self-hosted, never a CDN). -->
    <link
      rel="preload"
      href="/fonts/inter/inter-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/inter/inter-500-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
