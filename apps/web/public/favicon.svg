<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Violin Tools mark: the three-line neck motif of the Scales nav glyph
       (DESIGN.md §0 ic-scales) on the dark canvas, strung in brand mint. The
       hex literals here are the resolved values of {canvas} (#0a0a0a) and {mint}
       (#00d4a4) from DESIGN.md §0 — a standalone static asset cannot read CSS
       custom properties, so the two brand literals are inlined. -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a" />
  <g stroke="#00d4a4" stroke-width="2" stroke-linecap="round">
    <line x1="8" y1="10" x2="24" y2="10" />
    <line x1="8" y1="16" x2="24" y2="16" />
    <line x1="8" y1="22" x2="24" y2="22" />
  </g>
</svg>
